{% extends "base.html" %}
{% block title %}決済 | Self Drink Bar{% endblock %}

{% block content %} 
<h2>決済（疑似）</h2>
<p>※ポートフォリオ用の疑似決済です。</p>
<br>
<div class="payment">
    決済方法: {{ method }}<br>
    税抜合計: {{ total_price }}円
    消費税　: {{ (total_price * 0.1) | round(0) | int}}円
    税込合計: {{ (total_price * 1.1) | round(0) | int }}円
</div>

<form action="/payment/complete" method="POST">
    <button type="submit" class="btn-next">決済を完了する</button>
</form>

<a href="/payment_method" class="btn-back">戻る</a>
{% endblock %}
