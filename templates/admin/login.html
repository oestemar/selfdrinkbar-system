{% extends "admin/admin_base.html" %}
{% block title %}管理者ログイン{% endblock %}

{% block content %}
<h2 class="text-center mt-2 mb-4">管理者ログイン</h2>

<div class="container col-md-3 mx-auto mt-2 mb-2">
    <form action="/admin/login" method="POST">
        <label class="mt-4 text-start">ID: </label><br>
        <input type="text" class="form-control" name="username" required><br><br>
        <label class="text-start">パスワード: </label><br>
        <input type="password" class="form-control" name="password" required><br><br>
        <button type="submit" class="btn btn-sm btn-secondary">ログイン</button>
    </form>
</div>

{% endblock %}
