<!-- templates/admin/error.html -->
{% extends "admin/admin_base.html" %}
{% block title %}エラー{% endblock %}

{% block content %}
<h2>エラーが発生しました</h2>

{% if message %}
    <div class="error">{{ message }}</div>
{% endif %}
<a href="/admin/dashboard" class="menu_back">メニューに戻る</a>
<a href="/admin/logout" class="logout">ログアウト</a>
{% endblock %}
