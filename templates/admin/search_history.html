{% extends "base.html" %}
{% block title %}購入履歴検索{% endblock %}

{% block content %}
<h2>購入履歴検索</h2>

<form action="/admin/search_history" method="POST">
    <label>日付: <input type="date" name="date"></label>
    <button type="submit">検索</button>
</form>

<table>
    <tr><th>ID</th><th>日時</th><th>金額</th><th>決済方法</th></tr>
    {% for order in orders %}
    <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.created_at }}</td>
        <td>{{ order.total_price }}</td>
        <td>{{ order.payment_method }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
