{% extends "admin/admin_base.html" %}
{% block title %}パスワード変更{% endblock %}

{% block content %}
<h2 class="text-center mt-2 mb-4">パスワード変更</h2>

<div class="container col-md-3 mx-auto mt-2 mb-2">
    <form action="/admin/password" method="POST">
        <label class="text-start">現在のパスワード: </label><br>
        <input type="password"  class="form-control" name="current" required><br><br>
        <label class="text-start">新しいパスワード: </label><br>
        <input type="password"  class="form-control" name="new" required><br>
        <label class="text-start">確認用パスワード: </label>
        <input type="password"  class="form-control" name="confirm" required><br><br>
        <button type="submit">変更</button>
    </form>
</div>

{% endblock %}
