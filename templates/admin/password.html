{% extends "base.html" %}
{% block title %}パスワード変更{% endblock %}

{% block content %}
<h2>パスワード変更</h2>

<form action="/admin/password" method="POST">
    <label>現在のパスワード: <input type="password" name="current" required></label><br>
    <label>新しいパスワード: <input type="password" name="new" required></label><br>
    <button type="submit">変更</button>
</form>
{% endblock %}
