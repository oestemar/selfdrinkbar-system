{% extends "admin/admin_base.html" %}
{% block title %}商品登録{% endblock %}

{% block content %}
<h2>商品登録</h2>

<form action="/admin/register" method="POST">
    <label>商品名: <input type="text" name="name" required></label><br>
    <label>価格: <input type="number" name="price" required></label><br>
    <label>カテゴリ:
        <select name="category">
            <option value="coffee">コーヒー</option>
            <option value="tea">紅茶</option>
            <option value="green_tea">緑茶</option>
            <option value="softdrink">ソフトドリンク</option>
        </select>
    </label><br>
    <label>商品説明: <textarea name="description"></textarea></label><br>
    <button type="submit">登録</button>
</form>
{% endblock %}
