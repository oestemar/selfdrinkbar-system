{% extends "base.html" %}
{% block title %}コーヒーメニュー | Self Drink Bar{% endblock %}

{% block content %}

    <!-- タブ -->
    <div class="tabs">
        <a href="/menu/coffee" class="tab {% if category=='coffee' %}active{% endif %}">コーヒー</a>
        <a href="/menu/tea" class="tab {% if category=='tea' %}active{% endif %}">紅茶</a>
        <a href="/menu/green_tea" class="tab {% if category=='green_tea' %}active{% endif %}">緑茶</a>
        <a href="/menu/softdrink" class="tab {% if category=='softdrink' %}active{% endif %}">ソフトドリンク</a>
    </div>

    <!-- 商品一覧 -->
    <div class="items">
        {% for item in items %}
            <div class="item">
                <div class="item-name">{{ item.name }}</div>
                <div class="item-price">{{ item.price }}円</div>
                <form action="/cart/add" method="POST">
                    <input type="hidden" name="item_id" value="{{ item.id }}">
                    <button type="submit">追加</button>
                </form>
            </div>
        {% endfor %}
    </div>

{% endblock %}
</body>
</html>
