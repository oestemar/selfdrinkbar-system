{% extends "base.html" %}
{% block title %}コーヒーメニュー | Self Drink Bar{% endblock %}

{% block content %}

    <!-- タブ -->   
    <ul class="nav justify-content-center nav-tabs">
        <li class="nav-item">
            <a href="/menu/coffee" class="nav-link {% if category=='coffee' %}active{% endif %}">コーヒー</a>
        </li>
        <li class="nav-item">
            <a href="/menu/tea" class="nav-link {% if category=='tea' %}active{% endif %}">紅茶</a>
        </li>
        <li class="nav-item">
            <a href="/menu/green_tea" class="nav-link {% if category=='green_tea' %}active{% endif %}">緑茶</a>
        </li>
        <li class="nav-item">
            <a href="/menu/softdrink" class="nav-link {% if category=='softdrink' %}active{% endif %}">ソフトドリンク</a>
        </li>
    </ul>

    <!-- 商品一覧 -->
    <div class="container mt-4">
        <div class="row">
            {% for item in items %}
                <div class="col-md-3 col-sm-6 mb-4">
                    <div class="card h-100">
                        <div class="card-body d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="card-title mb-0">{{ item.name }}</h5>
                                <span class="text-primary fw-bold">{{ item.price }}円</span>                                    
                            </div>
                            <p class="card-text text-truncate">{{ item.description }}</p>     
                            
                            <div class="mt-auto">                                   
                                <button type="button" class="btn btn-primary add-to-cart" data-id="{{ item.id }}">追加</button>
                            </div>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>

{% endblock %}
{% block scripts %}
    <script src="/static/js/cart.js"></script>
{% endblock %}
