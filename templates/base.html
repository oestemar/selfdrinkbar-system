<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Self Drink Bar{% endblock %}</title>
</head>
<body>

    <!-- ① 最上部：タイトル＋カート -->
    <header class="header">
        <div class="title">Self Drink Bar</div>
        <div class="cart">
            <a href="/cart">🛒 カート (<span id="cart-count">{{ cart_count }}</span>)</a>
        </div>
    </header>

    <!-- ② 手続き遷移表示（ステップバー） -->
    <nav class="step-bar">
        <ul>
            <li class="active">メニュー</li>
            <li>カート</li>
            <li>精算</li>
            <li>決済</li>
            <li>完了</li>
        </ul>
    </nav>

    <!-- ③ 中央メイン：メニュー（タブ切り替え） -->
    <main>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

</body>
</html>
