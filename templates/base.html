<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Self Drink Bar{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- ① 最上部：タイトル＋カート -->
    <header class="d-flex justify-content-between align-items-center flex-row p-2">
        <div class="title p-2 mx-auto h2">Self Drink Bar</div>
        <div class="cart p-2 h3">
            <a href="/cart">
                🛒 (<span id="cart-count">{{ cart_count }}</span>)
            </a>
        </div>
        <div class="admin-login p-2">
            <a href="/admin/login">管理者ログイン</a>
        </div>  
    </header>

    <!-- ② 手続き遷移表示（ステップバー） -->
    <nav class="step-bar">
        <ul>
            <li>
                <div class="circle {% if step == 'menu' %}active{% endif %}"></div>
                <div class="label">メニュー選択</div>
            </li>
            <li>
                <div class="circle {% if step == 'cart' %}active{% endif %}"></div>
                <div class="label">カート</div>
            </li>
            <li>
                <div class="circle {% if step == 'checkout' %}active{% endif %}"></div>
                <div class="label">精算確認</div>
            </li>
            <li>
                <div class="circle {% if step == 'payment_method' %}active{% endif %}"></div>
                <div class="label">決済方法</div>
            </li>
            <li>
                <div class="circle {% if step == 'payment' %}active{% endif %}"></div>
                <div class="label">決済</div>
            </li>            
            <li>
                <div class="circle {% if step == 'complete' %}active{% endif %}"></div>
                <div class="label">完了</div>
            </li>
        </ul>
    </nav>

    <!-- ③ 中央メイン：メニュー（タブ切り替え） -->
    <main>
        {% block content %}      
        {% endblock %}
            
        {% if error %}
        <div class="text-white error">{{ error }}</div>
        {% endif %}  
    </main>

    {% block scripts %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
