{% extends "base.html" %}
{% block title %}決済 | Self Drink Bar{% endblock %}

{% block content %}
<h2 class="text-white nav-tabs">決済　※ポートフォリオ用疑似</h2>
<p class="text-white comment">クレジットカード決済（疑似）を選択しました。</p>

<div class="payment">
    <div class="pay-operation-wrapper">
        <div class="card-image">
            <label for="card_number">カード番号:</label><br>
            <input type="text" id="card_number" name="card_number" value="4242 4242 4242 4242" required readonly><br><br>
            
            <label for="expiry_date">有効期限:</label><br>
            <input type="text" id="expiry_date" name="expiry_date" value="12/34" required readonly><br><br>

            <label for="cvv">CVV:</label><br>
            <input type="text" id="cvv" name="cvv" value="123" required readonly><br><br>
        </div>
        <table class="pay-operation-total-table">
            <tr>
                <td>税抜合計</td>
                <td>{{ total_price }}</td>
            </tr>
            <tr>
                <td>消費税</td>
                <td>{{ (total_price * 0.1) | round(0) | int }}</td>
            </tr>
            <tr>
                <td>税込合計</td>
                <td>{{ (total_price * 1.1) | round(0) | int }}</td>
            </tr>
        </table>
    </div>
</div>
<div class="pay-operation-actions">
    <a href="/payment_method" class="btn btn-primary btn-back">決済方法選択に戻る</a>
    <form action="/payment/complete" method="POST">
    <button type="submit" class="btn btn-primary btn-next">決済を完了する</button>
    </form>
</div

{% endblock %}
